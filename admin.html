  <title>VELZORO Dashboard</title>

  <style>
    body {
      font-family: Poppins;
      background: #f8f6f3;
      padding: 20px;
    }

    #product-list {
      display: flex;
      flex-wrap: wrap;
    }

    .top-bar {
      align-items: center;
      display: flex;
      justify-content: space-between;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin: 20px 0;
    }

    .card-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .order {
      background: white;
      padding: 10px;
      margin: 10px 0;
    }

    #product-list div {
      border: 1px solid #ddd;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      height: 40px;
      background: black;
      color: white;
      padding: 6px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="top-bar">
    <div class="nav-left">
    <button onclick="goBack()" class="back-btn">⟵</button>
  </div>

  <h1 class="name">📊 Dashboard</h1>
  <button onclick="logout()">Logout</button>
</div>

<h2>Products</h2>
<div id="product-list"></div>

<h2>Add Product</h2>

<input id="p-name" placeholder="Name"><br><br>
<input id="p-price" placeholder="Price"><br><br>
<input id="p-image" placeholder="Image URL"><br><br>

<select id="p-category">
  <option value="attar">Attar</option>
  <option value="perfume">Perfume</option>
</select><br><br>

<textarea id="p-desc"></textarea><br><br>

<button onclick="addProduct()">Add</button>

<script type="module" src="admin.js"></script>

</body>
</html>
